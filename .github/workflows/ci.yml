name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra evals
      - name: Lint
        run: uv run ruff check src tests
      - name: Security scan (bandit)
        run: uv run bandit -c pyproject.toml -r src
      - name: Typecheck (non-blocking)
        # 38 pre-existing errors as of this workflow's introduction; tighten
        # once the backlog is cleared instead of blocking every PR on it.
        run: uv run mypy src || true
      - name: Test
        env:
          # Dummy values so config "is this configured?" checks pass; no real
          # network calls are made in the mocked test suite (see auth.py /
          # supabase_store.py — invalid tokens fail parsing before any
          # request reaches these URLs).
          SUPABASE_URL: https://example.com
          SUPABASE_SECRET_KEY: dummy-secret-key-for-ci
          SUPABASE_JWKS_URL: https://example.com/auth/v1/.well-known/jwks.json
        run: uv run python -m pytest tests/ -q

  ui:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npx eslint src --max-warnings=0
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.app.json
      - name: Test
        run: npx vitest run

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, ui]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t cortex:${{ github.sha }} .
      - name: Generate container SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: cortex:${{ github.sha }}
          format: cyclonedx
          output: cortex-sbom.cdx.json
          scanners: vuln
      - name: Upload container SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cortex-sbom-${{ github.sha }}
          path: cortex-sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
      - name: Scan repository dependencies and configuration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: table
      - name: Scan container image
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: cortex:${{ github.sha }}
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: table
