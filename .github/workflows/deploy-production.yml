name: Deploy production backend

run-name: Deploy production backend from ${{ github.event.workflow_run.head_sha || github.sha }}

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: production-backend
  cancel-in-progress: false

jobs:
  guard-main:
    name: Require main
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check branch and CI outcome
        id: check
        env:
          DEPLOY_REF: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          # CI already reports its own failures; a failed/cancelled CI run should
          # make this workflow skip quietly rather than raise a second, redundant
          # failure for the same underlying problem.
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            if [[ "$WORKFLOW_RUN_BRANCH" != "main" ]]; then
              echo "CI ran on $WORKFLOW_RUN_BRANCH, not main; skipping deploy."
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ "$WORKFLOW_RUN_CONCLUSION" != "success" ]]; then
              echo "CI did not succeed (conclusion: $WORKFLOW_RUN_CONCLUSION); skipping deploy."
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          elif [[ "$DEPLOY_REF" != "refs/heads/main" ]]; then
            echo "Production deployments must run from main; received $DEPLOY_REF." >&2
            exit 1
          fi
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

  deploy:
    name: Migrate and deploy backend
    needs: guard-main
    if: needs.guard-main.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: Production
      url: ${{ steps.backend-url.outputs.service_url }}
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SMOKE_TEST_TOKEN: ${{ secrets.SMOKE_TEST_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate production configuration
        shell: bash
        run: |
          missing=()
          for name in \
            GCP_PROJECT \
            GCP_REGION \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_SERVICE_ACCOUNT \
            SUPABASE_PROJECT_REF \
            SUPABASE_ACCESS_TOKEN \
            SUPABASE_DB_PASSWORD
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} )); then
            printf 'Missing Production configuration: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --yes

      - name: Preview Supabase migrations
        id: migration-preview
        run: supabase db push --dry-run

      - name: Apply Supabase migrations
        id: migrations
        run: supabase db push --yes

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Install Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Deploy Cloud Run backend
        id: backend
        run: ./scripts/deploy.sh

      - name: Capture backend URL
        id: backend-url
        run: |
          service_url="$(gcloud run services describe cortex \
            --region="$GCP_REGION" \
            --project="$GCP_PROJECT" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "Cloud Run did not return a service URL." >&2
            exit 1
          fi
          echo "service_url=$service_url" >> "$GITHUB_OUTPUT"

      - name: Publish deployment summary
        if: always()
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          MIGRATION_PREVIEW_OUTCOME: ${{ steps.migration-preview.outcome }}
          MIGRATION_OUTCOME: ${{ steps.migrations.outcome }}
          BACKEND_OUTCOME: ${{ steps.backend.outcome }}
          SERVICE_URL: ${{ steps.backend-url.outputs.service_url }}
        run: |
          {
            echo "## Production backend deployment"
            echo
            echo "- **Commit:** \`$DEPLOY_SHA\`"
            echo "- **Migration preview:** ${MIGRATION_PREVIEW_OUTCOME:-not run}"
            echo "- **Migrations:** ${MIGRATION_OUTCOME:-not run}"
            echo "- **Cloud Run deploy and smoke checks:** ${BACKEND_OUTCOME:-not run}"
            if [[ -n "$SERVICE_URL" ]]; then
              echo "- **Backend:** $SERVICE_URL"
              echo "- **Health:** $SERVICE_URL/health"
              echo "- **Inngest follow-up:** verify the serve URL is $SERVICE_URL/api/inngest"
            else
              echo "- **Backend URL:** unavailable"
            fi
            echo "- **UI:** deployed independently by Vercel Git integration"
          } >> "$GITHUB_STEP_SUMMARY"
