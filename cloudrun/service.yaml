apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: cortex
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      timeoutSeconds: 300
      containers:
        # PROJECT_ID is substituted by scripts/deploy.sh at deploy time
        - image: gcr.io/PROJECT_ID/cortex:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 1Gi
              cpu: "1"
          startupProbe:
            httpGet:
              path: /ready
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
          env:
            # --- LLM ---
            - name: LLM_PROVIDER
              value: "openai"
            - name: OPENAI_MODEL
              value: "gpt-4o-mini"
            - name: EMBEDDING_PROVIDER
              value: "openai"
            - name: EMBEDDING_MODEL
              value: "text-embedding-3-small"
            - name: EMBEDDING_DIMENSIONS
              value: "1536"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: latest
            # --- Search ---
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tavily-api-key
                  key: latest
            # --- Graph store (Neo4j Aura) ---
            # URI and username are not sensitive; only the password lives in Secret Manager.
            - name: NEO4J_URI
              value: "neo4j+s://586ad0dd.databases.neo4j.io"
            - name: NEO4J_USERNAME
              value: "586ad0dd"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-password
                  key: latest
            - name: NEO4J_DATABASE
              value: "586ad0dd"
            # --- Supabase ---
            - name: SUPABASE_URL
              value: "https://oukmugleriangmcdkocn.supabase.co"
            - name: SUPABASE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secret-key
                  key: latest
            - name: SUPABASE_JWKS_URL
              value: "https://oukmugleriangmcdkocn.supabase.co/auth/v1/.well-known/jwks.json"
            - name: READINESS_REQUIRE_SUPABASE
              value: "true"
            - name: READINESS_REQUIRE_NEO4J
              value: "true"
            # --- Inngest ---
            - name: INNGEST_EVENT_KEY
              valueFrom:
                secretKeyRef:
                  name: inngest-event-key
                  key: latest
            - name: INNGEST_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: inngest-signing-key
                  key: latest
            # --- CORS ---
            - name: CORS_ORIGINS
              value: '["https://cortex-ai-prod.vercel.app"]'
            # --- Internal ---
            - name: INTERNAL_DISPATCH_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-dispatch-secret
                  key: latest
            # --- Observability ---
            # ponytail: observability off for the free-tier deploy; re-add
            # langsmith-api-key / langfuse-* secrets when tracing matters.
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: sentry-dsn
                  key: latest
            - name: SENTRY_ENVIRONMENT
              value: "production"
            - name: LANGSMITH_TRACING
              value: "false"
